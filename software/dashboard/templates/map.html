<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAIS | GIS Digital Twin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        .map-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 24px;
            height: calc(100vh - 120px);
        }
        #map {
            width: 100%;
            height: 100%;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            background: #1e293b;
        }
        .layer-item {
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
            margin-bottom: 12px;
        }
        .layer-type { font-weight: 600; font-size: 0.9rem; }
        .layer-path { font-size: 0.75rem; color: var(--text-muted); word-break: break-all; }
        
        /* Dark mode overrides for leaflet */
        .leaflet-layer,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out,
        .leaflet-control-attribution {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="topbar">
            <div class="logo">SAIS <span>C2 Dashboard</span></div>
            
            <nav class="main-nav">
                <a href="/" class="nav-link">Operator Feed</a>
                <a href="/map" class="nav-link active">GIS Twin</a>
                <a href="/network" class="nav-link">Knowledge Graph</a>
                <a href="/admin" class="nav-link">Admin Setup</a>
            </nav>

            <div class="status-indicator">
                <span class="dot pulse"></span> System Online
            </div>
        </header>

        <main class="map-container">
            <!-- Layers Panel -->
            <section class="panel">
                <div class="panel-header">
                    <h2>Layer Control</h2>
                </div>
                <div class="panel-content">
                    <div id="layer-toggles">
                        <!-- Toggles dynamically injected here -->
                    </div>
                </div>
            </section>

            <!-- Map Panel -->
            <div id="map"></div>
        </main>
    </div>

    <script src="/static/map_layers.js"></script>
</body>
</html>
