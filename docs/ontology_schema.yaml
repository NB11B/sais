# SAIS Regenerative Agriculture Ontology Schema
# Version: 1.0
# Purpose: Define the knowledge graph entities, relationships, and sensor mappings for the SAIS Intelligence Platform.

classes:
  - name: SoilBiology
    description: "Living organisms in the soil food web."
    subclasses:
      - Bacteria
      - Fungi
      - Protozoa
      - Nematodes
      - Microarthropods
      - Earthworms
    properties:
      - respiration_rate (mg CO2/kg/day)
      - biomass_ratio (fungi:bacteria)
      - active_carbon (ppm)

  - name: SoilChemistry
    description: "Chemical properties and nutrient availability."
    properties:
      - pH
      - soil_organic_carbon (SOC %)
      - total_nitrogen (TN %)
      - cation_exchange_capacity (CEC)
      - NPK_levels (ppm)

  - name: SoilPhysics
    description: "Physical structure and environmental conditions."
    properties:
      - temperature (C)
      - volumetric_water_content (VWC %)
      - bulk_density (g/cm3)
      - aggregate_stability (%)
      - infiltration_rate (in/hr)

  - name: PlantHealth
    description: "Above-ground plant vitality and root system."
    properties:
      - brix_level (Degrees Brix)
      - root_depth (cm)
      - exudate_production (relative)
      - leaf_area_index (LAI)

  - name: ManagementPractice
    description: "Human interventions in the agricultural system."
    subclasses:
      - CoverCropping
      - RotationalGrazing
      - NoTill
      - CompostApplication
      - Irrigation

  - name: SensorNode
    description: "SAIS hardware deployed to measure properties."
    subclasses:
      - Package9_SoilBiology
      - Package1_SoilBaseline
      - Package8_VisionAI
      - ManualInput

relationships:
  - source: SoilBiology
    type: DRIVES
    target: SoilChemistry
    description: "Microbes mineralize nutrients, making them plant-available."

  - source: SoilBiology
    type: BUILDS
    target: SoilPhysics
    description: "Microbial glues (glomalin) and fungal hyphae build soil aggregates."

  - source: PlantHealth
    type: FEEDS
    target: SoilBiology
    description: "Plants release root exudates (sugars) to feed specific microbes."

  - source: SoilChemistry
    type: NOURISHES
    target: PlantHealth
    description: "Available nutrients support plant growth and immunity."

  - source: ManagementPractice
    type: MODIFIES
    target: SoilPhysics
    description: "Practices like no-till preserve aggregate stability."

  - source: ManagementPractice
    type: STIMULATES
    target: SoilBiology
    description: "Cover crops provide continuous living roots to feed microbes."

  - source: SensorNode
    type: MEASURES
    target: [SoilBiology, SoilChemistry, SoilPhysics, PlantHealth]

sensor_mappings:
  - property: SoilBiology.respiration_rate
    sensor: Package9_SoilBiology.SCD41
    frequency: "5-minute flux chamber cycle"

  - property: SoilPhysics.temperature
    sensor: Package9_SoilBiology.DS18B20
    frequency: "Continuous"

  - property: SoilPhysics.volumetric_water_content
    sensor: Package1_SoilBaseline.CapacitiveMoisture
    frequency: "Continuous"

  - property: PlantHealth.brix_level
    sensor: ManualInput.Refractometer
    frequency: "Weekly"

  - property: SoilChemistry.NPK_levels
    sensor: Package1_SoilBaseline.NPK_Probe
    frequency: "Daily"

  - name: WaterCycle
    description: "Hydrological movement through the farm ecosystem."
    properties:
      - infiltration_rate (in/hr)
      - evapotranspiration_rate (mm/day)
      - groundwater_recharge (volume)

  - name: Atmosphere
    description: "Greenhouse gas exchange and climate impact."
    properties:
      - net_carbon_flux (kg CO2e/ha/yr)
      - methane_emissions (kg CH4/head/yr)
      - nitrous_oxide_flux (kg N2O/ha/yr)

  - name: Livestock
    description: "Animals integrated into the farming system."
    properties:
      - stocking_density (AU/ha)
      - rest_period (days)
      - forage_utilization (%)

  - name: FarmEcosystem
    description: "Broader biodiversity and ecological health."
    properties:
      - species_richness (index)
      - predator_prey_ratio
      - habitat_connectivity (%)

  - name: MarketFinancial
    description: "Economic valuation of agricultural and ecological outputs."
    properties:
      - verified_carbon_units (VCU)
      - profit_per_acre ($)
      - input_cost_reduction (%)

# Expanded Relationships
  - source: SoilPhysics
    type: REGULATES
    target: WaterCycle
    description: "Aggregate stability determines infiltration vs runoff."

  - source: PlantHealth
    type: DRIVES
    target: WaterCycle
    description: "Canopy cover and root depth drive transpiration."

  - source: SoilBiology
    type: EMITS
    target: Atmosphere
    description: "Microbial respiration releases CO2 and N2O."

  - source: Livestock
    type: INOCULATES
    target: SoilBiology
    description: "Rumen microbes and manure stimulate soil life."

  - source: Livestock
    type: PRUNES
    target: PlantHealth
    description: "Adaptive grazing stimulates root shedding and regrowth."

  - source: FarmEcosystem
    type: PROTECTS
    target: PlantHealth
    description: "Predatory insects and birds control pest populations."

  - source: Atmosphere
    type: GENERATES
    target: MarketFinancial
    description: "Sequestered carbon translates to verifiable credits."

  - source: SensorNode
    type: VERIFIES
    target: MarketFinancial
    description: "Immutable sensor data provides MRV for ecosystem markets."

# Expanded Sensor Mappings
  - property: WaterCycle.infiltration_rate
    sensor: Package1_SoilBaseline.MoistureArray
    frequency: "Event-based (Rainfall)"

  - property: Atmosphere.methane_emissions
    sensor: Package6_LivestockTags.AcousticSensor
    frequency: "Continuous (Proxy via rumination audio)"

  - property: Livestock.stocking_density
    sensor: Package6_LivestockTags.GPS
    frequency: "Hourly"

  - property: FarmEcosystem.predator_prey_ratio
    sensor: Package8_VisionAI.Camera
    frequency: "Daily"
